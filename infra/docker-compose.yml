version: "3.9"
services:
  api:
    build: ../apps/api
    env_file: ../.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SSE_REDIS_URL=${SSE_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ["8000:8000"]
  worker:
    build: ../apps/api
    env_file: ../.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SSE_REDIS_URL=${SSE_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "worker.celery_app", "worker", "-l", "info"]
  web:
    build: ../apps/web
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports: ["3000:3000"]
    depends_on: [api]
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: consultaion
      POSTGRES_USER: ${POSTGRES_USER:-consultaion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_dev}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-consultaion} -d consultaion",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Use appendonly to ensure local/persistent queue items don't drop instantly on restart
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

volumes:
  pg_data:
