version: "3.8"

# Docker Compose for smoke tests — production-like topology.
# API is reachable from web via service name, not localhost.
# Uses PostgreSQL instead of SQLite for realistic testing.

services:
  postgres:
    image: postgres:16-alpine
    container_name: consultaion-smoke-postgres
    environment:
      POSTGRES_USER: consultaion
      POSTGRES_PASSWORD: smoke_test_password
      POSTGRES_DB: consultaion_smoke
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consultaion -d consultaion_smoke"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - smoke-net

  redis:
    image: redis:7-alpine
    container_name: consultaion-smoke-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - smoke-net

  migrate:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: consultaion-smoke-migrate
    environment:
      - ENV=test
      - APP_ENV=smoke
      - USE_MOCK=true
      - REQUIRE_REAL_LLM=false
      - DATABASE_URL=postgresql+psycopg://consultaion:smoke_test_password@postgres:5432/consultaion_smoke
      - JWT_SECRET=smoke-test-secret-key-for-ci-only
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    networks:
      - smoke-net

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: consultaion-smoke-api
    ports:
      - "8000:8000"
    environment:
      - ENV=test
      - APP_ENV=smoke
      - USE_MOCK=true
      - REQUIRE_REAL_LLM=false
      - DATABASE_URL=postgresql+psycopg://consultaion:smoke_test_password@postgres:5432/consultaion_smoke
      - JWT_SECRET=smoke-test-secret-key-for-ci-only
      - WEB_APP_ORIGIN=http://localhost:3000
      - REDIS_URL=redis://redis:6379/0
      - SSE_BACKEND=redis
      - SSE_REDIS_URL=redis://redis:6379/0
      - STRIPE_WEBHOOK_VERIFY=false
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - smoke-net

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: consultaion-smoke-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_INTERNAL_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - smoke-net

networks:
  smoke-net:
    driver: bridge
