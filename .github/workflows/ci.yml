name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  url-scan:
    name: Hardcoded URL Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install root deps
        run: npm ci
      - name: Scan for hardcoded URLs
        run: npm run lint:urls

  i18n-parity:
    name: i18n Parity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run i18n parity check
        run: npm run lint:i18n

  url-scan-full:
    name: Full Hardcoded Domain Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install root deps
        run: npm ci
      - name: Full scan for prod domains
        run: npm run lint:urls:full

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python Security Tools
        run: |
          pip install bandit pip-audit

      - name: Run Bandit (SAST)
        run: |
          bandit -r apps/api -ll -ii

      - name: Run pip-audit (Python Dependency Scan)
        run: |
          pip-audit -r apps/api/requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run npm audit (Node Dependency Scan)
        run: |
          cd apps/web
          npm audit --audit-level=high

  sbom-generation:
    name: SBOM Generation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install SBOM Tools
        run: |
          pip install cyclonedx-bom pip-audit

      - name: Generate Python SBOM
        working-directory: apps/api
        run: |
          cyclonedx-py environment --format json --output-file ../../sbom-python.json
        continue-on-error: true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Node SBOM
        working-directory: apps/web
        run: |
          npx @cyclonedx/cyclonedx-npm --output-file ../../sbom-node.json
        continue-on-error: true

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-python.json
            sbom-node.json
          retention-days: 90

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run ruff
        run: |
          cd ../..
          ruff check apps/api

      - name: Run mypy
        run: |
          cd ../..
          mypy apps/api

      - name: Run tests with coverage
        env:
          ENV: test
          USE_MOCK: "1"
          REQUIRE_REAL_LLM: "0"
          STRIPE_WEBHOOK_VERIFY: "0"
          JWT_SECRET: "test_jwt_secret_32_chars_long_123456"
          DATABASE_URL: "sqlite:///./ci_test.db"
          PROVIDER_KEY_ENCRYPTION_KEYS: '{"1":"dGVzdC1rZXktZm9yLWNpLXRlc3Rpbmctb25seS0zMnY="}'
          PROVIDER_KEY_ACTIVE_VERSION: "1"
        run: |
          pytest -q

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: apps/api/coverage.xml

  backend-postgres-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: consultaion_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Verify Single Alembic Migration Head
        run: bash ../../scripts/check-alembic-heads.sh

      - name: Run Alembic Migrations
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgrespassword@localhost:5432/consultaion_test"
        run: |
          alembic upgrade head

      - name: Check Schema Drift
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgrespassword@localhost:5432/consultaion_test"
        run: bash ../../scripts/check-schema-drift.sh

      - name: Run integration tests on Postgres
        env:
          ENV: test
          USE_MOCK: "1"
          REQUIRE_REAL_LLM: "0"
          STRIPE_WEBHOOK_VERIFY: "0"
          JWT_SECRET: "test_jwt_secret_32_chars_long_123456"
          DATABASE_URL: "postgresql+psycopg://postgres:postgrespassword@localhost:5432/consultaion_test"
          PROVIDER_KEY_ENCRYPTION_KEYS: '{"1":"dGVzdC1rZXktZm9yLWNpLXRlc3Rpbmctb25seS0zMnY="}'
          PROVIDER_KEY_ACTIVE_VERSION: "1"
        run: |
          pytest -q tests/test_arena_compare_integration.py tests/test_debates_api.py tests/test_models.py tests/test_provider_credentials.py tests/test_audit_deletion.py tests/test_stripe_webhook_atomicity.py tests/test_sse_reliability.py

  openapi-drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Check OpenAPI Drift
        run: |
          ./scripts/check_openapi_drift.sh

  python-3.12-compatibility-nonblocking:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run focused tests under Python 3.12 (Non-blocking)
        env:
          ENV: test
          USE_MOCK: "1"
          REQUIRE_REAL_LLM: "0"
          STRIPE_WEBHOOK_VERIFY: "0"
          JWT_SECRET: "test_jwt_secret_32_chars_long_123456"
          DATABASE_URL: "sqlite:///./ci_test.db"
        run: |
          pytest -q tests/test_api_status.py tests/test_logging.py tests/test_claim_quality.py

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Mock env vars needed for build
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  e2e-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      # --- Backend Setup ---
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Backend Dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install uvicorn

      # --- Frontend Setup ---
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build Frontend
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      # --- Playwright Setup & Run ---
      - name: Install Root Playwright
        run: npm install -D @playwright/test playwright

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Seed E2E Test Database
        working-directory: apps/api
        env:
          DATABASE_URL: "sqlite:///./e2e_test.db"
        run: |
          python -c '
          from database import engine
          from sqlmodel import Session, SQLModel
          from models import User
          from auth import hash_password
          SQLModel.metadata.create_all(engine)
          with Session(engine) as session:
              if not session.query(User).filter_by(email="test@example.com").first():
                  user = User(email="test@example.com", password_hash=hash_password("password123"))
                  session.add(user)
                  session.commit()
          '

      - name: Run Playwright Tests
        run: npx playwright test
        env:
          CI: true
          # URLs
          API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_API_URL: http://localhost:8000
          # Test Env Configs
          ENV: test
          USE_MOCK: "1"
          REQUIRE_REAL_LLM: "0"
          DISABLE_AUTORUN: "1"
          DATABASE_URL: "sqlite:///./e2e_test.db"
          JWT_SECRET: "test_secret_for_ci_pipeline_12345"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  web-typecheck:
    name: Web TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Record exact commit
        run: echo "GIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: TypeScript check
        run: npx tsc --noEmit

  web-unit-tests:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Run Vitest
        run: npm run test -- --run

  alembic-policy:
    name: Alembic Revision Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Record exact commit
        run: echo "GIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Run Alembic audit (CI mode)
        run: python scripts/audit_alembic_revisions.py --ci
      - name: Run safe migration check
        working-directory: apps/api
        run: |
          pip install -r requirements.txt
          python scripts/migrate_database.py --check

  migration-integration:
    name: Migration Integration
    runs-on: ubuntu-latest
    needs: [alembic-policy]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: consultaion_migration_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run safe migration
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgrespassword@localhost:5432/consultaion_migration_test"
        working-directory: apps/api
        run: python scripts/migrate_database.py
      - name: Verify revision matches head
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgrespassword@localhost:5432/consultaion_migration_test"
        working-directory: apps/api
        run: python scripts/migrate_database.py --check

  redis-sse-integration:
    name: Redis SSE Integration
    runs-on: ubuntu-latest
    needs: [backend-test]
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run SSE integration tests
        env:
          ENV: test
          REDIS_URL: "redis://localhost:6379"
          SSE_BACKEND: "redis"
          JWT_SECRET: "test_jwt_secret_32_chars_long_123456"
          DATABASE_URL: "sqlite:///./ci_test.db"
        working-directory: apps/api
        run: |
          python -m pytest tests/test_sse_redis_backend.py tests/test_test_isolation_guards.py -x -v

  auth-regression:
    name: Authorization Regression
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run authorization regression tests
        env:
          ENV: test
          JWT_SECRET: "test_jwt_secret_32_chars_long_123456"
          DATABASE_URL: "sqlite:///./ci_test.db"
        working-directory: apps/api
        run: |
          python -m pytest -q tests/test_auth_flows.py tests/test_google_auth.py tests/test_redact.py -x

  architecture-graph-validation:
    name: Architecture Graph Validation (Custom AST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install networkx

      - name: Run Build Architecture Graph
        run: |
          # Make scripts executable
          chmod +x scripts/*.sh scripts/*.py
          # Run build script (custom AST graph builder)
          ./scripts/build-architecture-graph.sh

      - name: Upload Architecture Graph Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: architecture-graph
          path: |
            graphify-out/code/
            graphify-out/repository/
          retention-days: 30

