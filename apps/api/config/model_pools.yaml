pools:
  free_pool:
    models:
      - mimo-v2-free
      - llama-3-free
    policies:
      - auto
      - direct
  pro_pool:
    models:
      - gpt4o-deep
      - claude-sonnet
      - gemini-2-5-pro
      - groq-llama-3-3
      - mistral-large
    policies:
      - auto
      - direct
      - fallback
  fallback_pool:
    models:
      - router-smart
      - router-deep
