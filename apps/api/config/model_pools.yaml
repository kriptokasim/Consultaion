  anthropic:
    direct_model: "anthropic/claude-3-5-sonnet-20240620"
    fallback_model: "openrouter/anthropic/claude-3.5-sonnet"
  gemini:
    direct_model: "gemini/gemini-2.5-pro-preview-06-05"
    fallback_model: "openrouter/google/gemini-2.5-pro"
